<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JingFei's Songs</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="splashScreen" class="splash-screen" role="button" tabindex="0">
        <div class="splash-title">Hey...Can you hear me？</div>
        <div class="splash-subtitle">-鼠标点击任意位置进入-</div>
    </div>

    <div id="app">
        <header>
            <div class="header-bar">
                <div class="header-main">
                    <h1>JingFei's Songs</h1>
                    <div class="header-controls">
                        <div class="compact-search">
                            <button id="searchModeBtn" class="search-mode-btn" type="button">歌名</button>
                            <input type="text" id="searchInput" placeholder="输入歌名搜索" autocomplete="off"
                                spellcheck="false">
                            <button id="searchBtn" class="search-btn" title="精确搜索">搜索</button>
                            <button id="searchBackBtn" class="search-back-btn hidden" type="button">返回首页</button>
                            <div id="searchModeMenu" class="search-mode-menu hidden">
                                <button type="button" data-mode="title">歌名</button>
                                <button type="button" data-mode="lyricist">作词</button>
                                <button type="button" data-mode="composer">作曲</button>
                                <button type="button" data-mode="keyword">关键词</button>
                            </div>
                        </div>
                        <button id="sortToggleBtn" class="layout-toggle-btn" title="切换时间排序">时间升序</button>
                        <button id="layoutToggleBtn" class="layout-toggle-btn" title="切换布局">网格布局</button>
                    </div>
                </div>
                <nav class="header-nav" aria-label="主导航">
                    <a id="navHome" href="#">首页</a>
                    <a id="navAlbum" href="#">专辑</a>
                    <a id="navEcho" href="#">别处回响</a>
                    <a id="navInfo" href="#">更多信息</a>
                </nav>
            </div>
        </header>

        <!-- 首页：曲库列表 -->
        <main id="libraryView" class="view">
            <div id="songList" class="song-grid"></div>
        </main>

        <!-- 搜索结果页 -->
        <section id="searchResultsView" class="view hidden">
            <div class="search-results-container">
                <div class="search-results-header">
                    <div>
                        <div class="search-results-title">搜索结果</div>
                        <div id="searchResultsSummary" class="search-results-summary"></div>
                    </div>
                    <button id="backToSearchLibraryBtn" class="secondary-btn" type="button">返回曲库</button>
                </div>
                <div id="searchResultList" class="song-grid"></div>
            </div>
        </section>

        <!-- 专辑列表 -->
        <section id="albumListView" class="view hidden">
            <div id="albumList" class="album-grid"></div>
        </section>

        <!-- 专辑详情页 -->
        <section id="albumDetailView" class="view hidden">
            <div class="album-detail-container">
                <button id="backToAlbumBtn" class="secondary-btn">返回专辑</button>
                <div id="albumDetailContent"></div>
            </div>
        </section>

        <!-- 更多信息 -->
        <section id="infoView" class="view hidden">
            <div class="info-layout">
                <aside class="info-menu" aria-label="更多信息导航">
                    <button type="button" data-section="guide">别处指南</button>
                    <button type="button" data-section="about">about JingFei's Songs</button>
                    <button type="button" data-section="contact">contact author</button>
                    <button type="button" data-section="thanks">thanks to</button>
                </aside>
                <div id="infoContent" class="info-panel"></div>
            </div>
        </section>

        <!-- 详情页：点击歌曲后显示 -->
        <section id="detailView" class="view hidden">
            <div class="detail-container">
                <div class="detail-top-actions">
                    <button id="backBtn" class="secondary-btn">返回</button>
                    <div class="detail-song-actions">
                        <button id="prevSongBtn" class="secondary-btn" type="button">上一首</button>
                        <button id="nextSongBtn" class="secondary-btn" type="button">下一首</button>
                    </div>
                </div>
                <div id="detailContent"></div>
            </div>
        </section>

        <!-- 状态匹配面板：独立功能 -->
        <section id="matchPanel" class="view hidden">
            <div class="match-container">
                <div class="match-back-row">
                    <button id="closeMatchBtn" class="secondary-btn match-back-btn">返回首页</button>
                </div>
                <div class="match-input-wrap">
                    <textarea id="matchInput" rows="3" placeholder="在这里输入一段文字,然后聆听别处回响（文字量可以尽可能大点，比较准一点）"></textarea>
                </div>
                <button id="matchBtn" class="primary-btn match-echo-btn">echo</button>
                <div id="matchResult" class="result-area"></div>
            </div>
        </section>

        <!-- 回响结果页：匹配结果展示 -->
        <section id="matchResultView" class="view hidden">
            <div class="match-container">
                <div id="matchEchoResult" class="result-area"></div>
                <div class="match-back-row match-result-actions">
                    <button id="backToMatchBtn" class="secondary-btn">返回回响</button>
                    <button id="goToMatchedDetailBtn" class="secondary-btn">歌曲详情</button>
                    <button id="nextEchoBtn" class="secondary-btn">重新回响</button>
                </div>
                <div id="echoHistoryList" class="echo-history-wrap"></div>
            </div>
        </section>
    </div>

    <button id="backToTopBtn" class="back-to-top-btn hidden" type="button" aria-label="返回顶部" title="返回顶部">
        <span aria-hidden="true">↑</span>
    </button>

    <div id="elsewhereGuideModal" class="modal hidden" role="dialog" aria-modal="true"
        aria-labelledby="elsewhereGuideTitle">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="elsewhereGuideTitle" class="modal-title">别处指南</h2>
                <button class="modal-close" id="elsewhereGuideClose" aria-label="关闭">×</button>
            </div>
            <div id="elsewhereGuideBody" class="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.3.0/dist/umd/full.js"></script>
</body>

</html>
